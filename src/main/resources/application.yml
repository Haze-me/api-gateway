spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: catalog-service
          uri: ${CATALOG_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/catalog/**
          filters:
            - JwtAuthFilter

        - id: commerce-service
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/commerce/**
          filters:
            - JwtAuthFilter

        - id: admin-vendor-service
          uri: ${ADMIN_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/api/admin/**
          filters:
            - JwtAuthFilter

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}

gateway:
  public-paths:
    - /api/catalog/products
    - /api/catalog/categories
    - /api/commerce/auth
    - /actuator/health
  blocked-paths:
    - /actuator/env
    - /actuator/beans
    - /actuator/mappings

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.marketplace.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
