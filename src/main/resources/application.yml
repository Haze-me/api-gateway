spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - https://emchrismobility.com
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600
      routes:
        - id: catalog-service
          uri: ${CATALOG_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/catalog/**
          filters:
            - JwtAuthFilter

        - id: commerce-service
          uri: ${COMMERCE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/commerce/**
          filters:
            - JwtAuthFilter

        - id: admin-vendor-service
          uri: ${ADMIN_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/api/admin/**
          filters:
            - JwtAuthFilter

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}

gateway:
  public-paths:
    - /api/v1/catalog/products
    - /api/v1/catalog/categories
    - /api/v1/commerce/auth
    - /actuator/health
  blocked-paths:
    - /actuator/env
    - /actuator/beans
    - /actuator/mappings

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.marketplace.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
